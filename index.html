<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Student Score Dashboard</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="container">
    <h1>Student Score Dashboard</h1>

    <div class="stats">
      <div class="card">
        <h3>Total Students</h3>
        <p id="total-students">0</p>
      </div>

      <div class="card">
        <h3>Average Score</h3>
        <p id="average-score">0</p>
      </div>

      <div class="card">
        <h3>Passed Students</h3>
        <p id="passed-students">0</p>
      </div>
    </div>

    <h2>Student List</h2>

    <div id="student-list" class="student-list"></div>
  </div>

  <script src="script.js"></script>
</body>
</html>
